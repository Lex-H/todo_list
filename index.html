<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星願清單 - StarWish</title>
    <style>
        :root {
            --bg-color: #0f0e0e;
            --sidebar-bg: #1a1516;
            --card-bg: #1e1b1b;
            --nav-bg: #3c292d;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --accent-gold: #dfb36b;
            --border-color: #333;
            --hover-bg: #2a2525;
            --danger: #ff5555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- 響應式切換邏輯 --- */
        #desktop-app { display: none; }
        #mobile-app { display: flex; }

        @media (min-width: 1024px) {
            #desktop-app { display: flex; }
            #mobile-app { display: none !important; }
        }

        /* --- 通用元件樣式 --- */
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
            background: #333;
        }

        .check-box {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .todo-item.completed .check-box {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .todo-item.completed .check-box::after {
            content: '✓';
            color: #000;
            font-weight: bold;
            font-size: 14px;
        }

        .todo-item.completed .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* =========================================
           電腦版樣式 (Desktop - 第二組風格)
           ========================================= */
        #desktop-app {
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .pc-container {
            width: 90vw;
            height: 85vh;
            max-width: 1200px;
            background-color: var(--bg-color);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .pc-sidebar {
            width: 80px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pc-sidebar:hover { width: 240px; }

        .pc-nav-menu {
            flex: 1;
            width: 100%;
            padding: 0 15px;
        }

        .pc-nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
        }

        .pc-nav-item:hover { background: var(--hover-bg); color: #fff; }

        .pc-nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

        .pc-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .pc-header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pc-input-area {
            padding: 0 40px 20px;
        }

        .pc-input-group {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
        }

        .pc-input-group input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        .pc-add-btn {
            background: var(--accent-gold);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================================
           手機版樣式 (Mobile - 第一組風格)
           ========================================= */
        #mobile-app {
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        .mobile-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
        }

        .mobile-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .mobile-footer {
            height: 80px;
            background: var(--nav-bg);
            border-top: 1px solid #4a3438;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .mobile-action-btn {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 列表項目共通樣式（微調） --- */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .item-text { flex: 1; font-size: 16px; }

        .delete-btn {
            color: var(--danger);
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }

        .delete-btn:hover { opacity: 1; }

        /* 隱藏捲軸 */
        #main-scroll-pc::-webkit-scrollbar, .mobile-content::-webkit-scrollbar {
            width: 6px;
        }
        #main-scroll-pc::-webkit-scrollbar-thumb, .mobile-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 電腦版佈局 -->
<div id="desktop-app">
    <div class="pc-container">
        <aside class="pc-sidebar">
            <nav class="pc-nav-menu">
                <div class="pc-nav-item">
                    <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>近期提醒</span>
                </div>
                <div class="pc-nav-item">
                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg>
                    <span>收藏項目</span>
                </div>
                <div class="pc-nav-item">
                    <svg viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>系統設定</span>
                </div>
            </nav>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar" alt="User">
        </aside>

        <main class="pc-main">
            <header class="pc-header">
                <div>
                    <h1 style="font-size: 28px; display: flex; align-items: center; gap: 10px;">
                        <span style="color: var(--accent-gold);">✓</span> 星願清單
                    </h1>
                    <p id="pc-date" style="color: var(--text-muted); margin-top: 5px;"></p>
                </div>
            </header>

            <section class="pc-input-area">
                <div class="pc-input-group">
                    <input type="text" id="pc-input" placeholder="新增一個願望任務... (Enter 確認)">
                    <button class="pc-add-btn" onclick="addTask('pc')">新增</button>
                </div>
            </section>

            <div id="main-scroll-pc" style="flex: 1; overflow-y: auto; padding: 0 40px 40px;">
                <div class="todo-list" id="todo-list-pc"></div>
            </div>
        </main>
    </div>
</div>

<!-- 手機版佈局 -->
<div id="mobile-app">
    <header class="mobile-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span style="color: var(--accent-gold); font-size: 24px; font-weight: bold;">✓</span>
            <div>
                <h2 style="font-size: 20px;">星願清單</h2>
                <p id="mobile-date" style="font-size: 12px; color: var(--text-muted);"></p>
            </div>
        </div>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar" alt="User">
    </header>

    <main class="mobile-content">
        <div class="todo-list" id="todo-list-mobile"></div>
    </main>

    <footer class="mobile-footer">
        <button class="mobile-action-btn" onclick="promptMobileAdd()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="mobile-action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </footer>
</div>

<script>
    // --- 資料引擎 ---
    let tasks = JSON.parse(localStorage.getItem('starwish_tasks')) || [
        { id: 1, text: "歡迎使用星願清單！", completed: false },
        { id: 2, text: "點擊方框完成任務，點擊垃圾桶刪除", completed: true }
    ];

    function saveTasks() {
        localStorage.setItem('starwish_tasks', JSON.stringify(tasks));
        renderAll();
    }

    // --- 渲染邏輯 ---
    function renderAll() {
        const pcList = document.getElementById('todo-list-pc');
        const mobileList = document.getElementById('todo-list-mobile');
        
        const html = tasks.map(task => `
            <div class="todo-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                <div class="check-box" onclick="toggleTask(${task.id})"></div>
                <div class="item-text">${task.text}</div>
                <div class="delete-btn" onclick="deleteTask(${task.id})">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>
            </div>
        `).join('');

        pcList.innerHTML = html;
        mobileList.innerHTML = html;
    }

    // --- 操作邏輯 ---
    function addTask(source) {
        const input = document.getElementById('pc-input');
        const text = input.value.trim();
        if (text) {
            tasks.unshift({ id: Date.now(), text: text, completed: false });
            input.value = "";
            saveTasks();
        }
    }

    function promptMobileAdd() {
        const text = prompt("想要許下什麼願望？");
        if (text && text.trim()) {
            tasks.unshift({ id: Date.now(), text: text.trim(), completed: false });
            saveTasks();
        }
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
        // 優化體驗：如果是完成，將其移到最後
        tasks.sort((a, b) => a.completed - b.completed);
        saveTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
    }

    // --- 初始化 ---
    function init() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        const dateStr = now.toLocaleDateString('zh-TW', options);
        
        document.getElementById('pc-date').innerText = dateStr;
        document.getElementById('mobile-date').innerText = dateStr;

        // PC 入口監聽 Enter
        document.getElementById('pc-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask('pc');
        });

        renderAll();
    }

    window.onload = init;
</script>
</body>
</html>
