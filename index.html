<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星願清單</title>
    <style>
        :root {
            --bg-color: #0f0e0e;
            --sidebar-bg: #1a1516;
            --card-bg: #1e1b1b;
            --nav-bg: #3c292d;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --accent-gold: #dfb36b;
            --gradient-start: #f47983;
            --gradient-end: #f5c469;
            --border-color: #333;
            --hover-bg: #2a2525;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 響應式核心容器 */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            background-color: var(--bg-color);
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* --- 電腦版 RWD 設計 --- */
        @media (min-width: 1024px) {
            .app-container {
                width: 90vw;
                height: 85vh;
                max-width: 1200px;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                box-shadow: 0 30px 60px rgba(0,0,0,0.8);
                overflow: hidden;
            }

            .sidebar {
                display: flex !important;
            }

            .main-content {
                border-left: 1px solid var(--border-color);
            }
        }

        /* 左側導覽欄 (僅電腦版) */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: none;
            flex-direction: column;
            padding: 40px 24px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .nav-item.active, .nav-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-main);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* 右側主區域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            position: relative;
        }

        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
        }

        .header-title span {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 4px;
        }

        /* 桌面端輸入框 */
        .input-section {
            padding: 0 40px 20px;
            display: none;
        }

        @media (min-width: 1024px) {
            .input-section {
                display: block;
            }
        }

        .input-group {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 16px;
            gap: 12px;
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(223, 179, 107, 0.2);
        }

        .input-group input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        /* 任務列表區域 */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 40px 100px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        @media (max-width: 768px) {
            main { padding: 15px 15px 100px; }
            header { padding: 20px; }
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .todo-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .todo-item:hover {
            transform: translateY(-2px);
            border-color: #444;
            background-color: var(--hover-bg);
        }

        .todo-item.dragging {
            opacity: 0.6;
            transform: scale(0.98);
            border: 2px dashed var(--accent-gold);
        }

        .todo-item.completed {
            opacity: 0.7;
        }

        .drag-handle {
            cursor: grab;
            opacity: 0.5;
            transition: 0.2s;
            padding: 5px;
        }

        .drag-handle:hover { opacity: 1; color: var(--accent-gold); }

        .check-box {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .todo-item.completed .check-box {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .todo-item.completed .check-box::after {
            content: '✓';
            color: #000;
            font-weight: bold;
            font-size: 14px;
        }

        .item-text {
            flex: 1;
            font-size: 16px;
            color: var(--text-main);
        }

        .todo-item.completed .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-action {
            opacity: 0.5;
            transition: 0.2s;
            cursor: pointer;
            padding: 5px;
        }

        @media (min-width: 1024px) {
            .delete-action { opacity: 0; }
            .todo-item:hover .delete-action { opacity: 1; }
        }

        /* 頁尾底部導航 (手機版) */
        footer {
            height: 80px;
            background: var(--nav-bg);
            border-top: 1px solid #4a3438;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 100;
        }

        @media (min-width: 1024px) {
            footer {
                position: static;
                background: transparent;
                border: none;
                height: 60px;
                padding: 0 40px 20px;
                justify-content: flex-end;
            }
            .mobile-only { display: none !important; }
        }

        /* 手機版導覽按鈕樣式 */
        .nav-action-btn {
            background: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-action-btn:active {
            background: rgba(223, 179, 107, 0.2);
            transform: scale(0.9);
        }

        .center-arrows {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .arrow-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .arrow-btn svg {
            stroke: var(--text-muted);
            transition: 0.2s;
        }

        .arrow-btn:active svg {
            stroke: var(--accent-gold);
            transform: scale(1.2);
        }

        /* 電腦版的新增按鈕樣式 */
        .btn-pc-add {
            background: var(--accent-gold);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-pc-add:hover {
            filter: brightness(1.1);
        }

        /* 頭像 */
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            cursor: pointer;
            transition: 0.3s;
        }

        .avatar:hover { transform: rotate(10deg) scale(1.1); }

    </style>
</head>
<body>

<div class="app-container">
    <!-- 左側側邊欄 (桌面端顯現) -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
            TASKS
        </div>
        <nav class="nav-menu">
            <div class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                全部任務
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                近期提醒
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg>
                收藏項目
            </div>
        </nav>
        <div style="margin-top: auto;">
            <img src="assets/avatar.png" class="avatar" alt="User">
        </div>
    </aside>

    <!-- 右側主內容 -->
    <div class="main-content">
        <header>
            <div class="header-title">
                星願清單
                <span id="date-string"><!-- 動態載入日期 --></span>
            </div>
            <!-- 手機版才顯示的頭像 -->
            <img src="assets/avatar.png" class="avatar mobile-only" alt="User">
        </header>

        <!-- 電腦版輸入框 -->
        <section class="input-section">
            <div class="input-group">
                <input type="text" id="pc-todo-input" placeholder="新增一個任務... (按 Enter 確認)">
                <button class="btn-pc-add" onclick="addFromPC()">新增</button>
            </div>
        </section>

        <main id="main-scroll">
            <div class="todo-list" id="todo-list">
                <!-- 預設項目 -->
                <div class="todo-item" draggable="true">
                    <span class="drag-handle">⋮⋮</span>
                    <div class="check-box" onclick="toggleCheck(this)"></div>
                    <div class="item-text">歡迎使用星願清單，點擊左下角+號按鈕新增項目</div>
                    <div class="delete-action" onclick="deleteItem(this)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff5555" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </div>
                </div>
            </div>
        </main>

        <!-- 手機版底部導航列 -->
        <footer class="mobile-only">
            <!-- 左側按鈕：新增 -->
            <button class="nav-action-btn" onclick="addNewItem()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>

            <!-- 中間按鈕：左右切換 (示意) -->
            <div class="center-arrows">
                <button class="arrow-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <button class="arrow-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </button>
            </div>

            <!-- 右側按鈕：選單 -->
            <button class="nav-action-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </footer>
    </div>
</div>

<script>
    const todoList = document.getElementById('todo-list');
    const pcInput = document.getElementById('pc-todo-input');

    // --- 1. 動態日期顯示 ---
    function updateDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date-string').innerText = now.toLocaleDateString('zh-TW', options);
    }
    updateDate();

    // --- 2. 任務邏輯 ---
    pcInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && pcInput.value.trim() !== "") {
            addFromPC();
        }
    });

    function addFromPC() {
        const text = pcInput.value.trim();
        if (text) {
            createItem(text);
            pcInput.value = "";
        }
    }

    function createItem(text) {
        const div = document.createElement('div');
        div.className = 'todo-item';
        div.draggable = true;
        div.innerHTML = `
            <span class="drag-handle">⋮⋮</span>
            <div class="check-box" onclick="toggleCheck(this)"></div>
            <div class="item-text">${text}</div>
            <div class="delete-action" onclick="deleteItem(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff5555" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </div>
        `;
        todoList.prepend(div);
    }

    function toggleCheck(btn) {
        const item = btn.closest('.todo-item');
        item.classList.toggle('completed');
        if (item.classList.contains('completed')) {
            setTimeout(() => {
                todoList.appendChild(item);
            }, 400);
        }
    }

    function deleteItem(btn) {
        const item = btn.closest('.todo-item');
        item.style.opacity = '0';
        item.style.transform = 'scale(0.8)';
        setTimeout(() => item.remove(), 300);
    }

    function addNewItem() {
        const text = prompt("請輸入新任務：");
        if (text) createItem(text);
    }

    // --- 3. 拖曳功能 ---
    let draggingElement = null;

    todoList.addEventListener('dragstart', (e) => {
        draggingElement = e.target.closest('.todo-item');
        draggingElement.classList.add('dragging');
    });

    todoList.addEventListener('dragend', (e) => {
        if(draggingElement) draggingElement.classList.remove('dragging');
        draggingElement = null;
    });

    todoList.addEventListener('dragover', (e) => {
        e.preventDefault();
        const afterElement = getDragAfterElement(todoList, e.clientY);
        if (afterElement == null) {
            todoList.appendChild(draggingElement);
        } else {
            todoList.insertBefore(draggingElement, afterElement);
        }
    });

    // 手機端模擬拖曳
    todoList.addEventListener('touchstart', (e) => {
        const handle = e.target.closest('.drag-handle');
        if (!handle) return;
        draggingElement = handle.closest('.todo-item');
        draggingElement.classList.add('dragging');
    }, { passive: false });

    todoList.addEventListener('touchmove', (e) => {
        if (!draggingElement) return;
        e.preventDefault();
        const touch = e.touches[0];
        const afterElement = getDragAfterElement(todoList, touch.clientY);
        if (afterElement == null) {
            todoList.appendChild(draggingElement);
        } else {
            todoList.insertBefore(draggingElement, afterElement);
        }
    }, { passive: false });

    todoList.addEventListener('touchend', () => {
        if (draggingElement) {
            draggingElement.classList.remove('dragging');
            draggingElement = null;
        }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.todo-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
</script>
</body>
</html>
