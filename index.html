<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代辦清單</title>
    <style>
        :root {
            --bg-color: #171515;
            --card-bg: #222222;
            --nav-bg: #3c292d;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --accent-gold: #dfb36b;
            --gradient-start: #f47983;
            --gradient-end: #f5c469;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 模擬手機螢幕的容器 */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 頂部標題區 */
        header {
            padding: 30px 20px 15px;
            text-align: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .header-title svg {
            width: 28px;
            height: 28px;
            fill: var(--accent-gold);
        }

        .gradient-line {
            height: 4px;
            background: linear-gradient(90deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            border-radius: 2px;
            margin: 0 10px;
        }

        /* 列表區塊 */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px 15px 100px; /* 底部留白給導覽列 */
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, opacity 0.2s;
        }

        .todo-item.deleting {
            transform: translateX(100%);
            opacity: 0;
        }

        /* 左側發光效果 */
        .todo-item::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 0;
            bottom: 0;
            width: 50px;
            background: radial-gradient(circle at left, rgba(223, 179, 107, 0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        /* 拖曳與勾選圖示容器 */
        .item-actions-left {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 2px;
            z-index: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .drag-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent-gold);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .check-icon {
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .todo-item.completed .check-icon {
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .todo-item.completed .check-icon::after {
            content: '';
            width: 5px;
            height: 10px;
            border: solid #000;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* 內容文字 */
        .item-content {
            flex: 1;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.5;
            word-break: break-all;
            z-index: 1;
        }

        .todo-item.completed .item-content {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* 刪除按鈕 */
        .delete-btn {
            margin-top: 2px;
            z-index: 1;
        }

        .delete-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .delete-btn:hover svg {
            stroke: #ff5555;
        }

        /* 底部導覽列 */
        footer {
            background-color: var(--nav-bg);
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-top: 1px solid #4a3438;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .nav-btn:active {
            background-color: rgba(223, 179, 107, 0.2);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--accent-gold);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-arrows {
            display: flex;
            gap: 30px;
        }

        .nav-arrows button {
            background: none;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .nav-arrows svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-title">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="12" fill="#dfb36b"/>
                <path d="M7 12.5l3.5 3.5 6.5-7" stroke="#171515" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span>代辦清單</span>
        </div>
        <div class="gradient-line"></div>
    </header>

    <main>
        <div class="todo-list" id="todo-list">
            <!-- 預設項目 1 -->
            <div class="todo-item">
                <div class="item-actions-left">
                    <button class="icon-btn drag-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 9h16M4 15h16"/>
                        </svg>
                    </button>
                    <div class="check-icon" onclick="toggleCheck(this)"></div>
                </div>
                <div class="item-content">
                    假設你是一個18歲的女高中生，活潑可愛，聰明溫柔。以這個身分思考和回答我的問題。回答字數控制在20字內。
                </div>
                <button class="icon-btn delete-btn" onclick="deleteItem(this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- 預設項目 2 -->
            <div class="todo-item">
                <div class="item-actions-left">
                    <button class="icon-btn drag-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 9h16M4 15h16"/>
                        </svg>
                    </button>
                    <div class="check-icon" onclick="toggleCheck(this)"></div>
                </div>
                <div class="item-content">您好</div>
                <button class="icon-btn delete-btn" onclick="deleteItem(this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- 預設項目 3 -->
            <div class="todo-item">
                <div class="item-actions-left">
                    <button class="icon-btn drag-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 9h16M4 15h16"/>
                        </svg>
                    </button>
                    <div class="check-icon" onclick="toggleCheck(this)"></div>
                </div>
                <div class="item-content">您好</div>
                <button class="icon-btn delete-btn" onclick="deleteItem(this)">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <footer>
        <button class="nav-btn" onclick="addNewItem()">
            <svg viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>
        
        <div class="nav-arrows">
            <button>
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <button>
                <svg viewBox="0 0 24 24">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </div>

        <button class="nav-btn">
            <svg viewBox="0 0 24 24">
                <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </footer>
</div>

<script>
    // 切換完成狀態
    function toggleCheck(element) {
        const todoItem = element.closest('.todo-item');
        todoItem.classList.toggle('completed');
    }

    // 刪除項目 (附帶簡單動畫)
    function deleteItem(element) {
        const todoItem = element.closest('.todo-item');
        todoItem.classList.add('deleting');
        setTimeout(() => {
            todoItem.remove();
        }, 200); // 等待動畫結束後移除 DOM
    }

    // 新增測試項目的功能 (綁定在左下角的 + 按鈕)
    function addNewItem() {
        const list = document.getElementById('todo-list');
        const newItemHTML = `
            <div class="todo-item">
                <div class="item-actions-left">
                    <button class="icon-btn drag-icon">
                        <svg viewBox="0 0 24 24"><path d="M4 9h16M4 15h16"/></svg>
                    </button>
                    <div class="check-icon" onclick="toggleCheck(this)"></div>
                </div>
                <div class="item-content">新的待辦事項</div>
                <button class="icon-btn delete-btn" onclick="deleteItem(this)">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        `;
        list.insertAdjacentHTML('beforeend', newItemHTML);
    }
</script>

</body>
</html>
